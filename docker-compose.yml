services:
  # Сервис основной реляционной базы данных (PostgreSQL)
  db:
    # Используем официальный легковесный образ PostgreSQL 15 на базе Alpine Linux
    image: postgres:15-alpine
    # Фиксированное имя контейнера для удобства обращения по сети Docker
    container_name: postgres_db
    # Переменные окружения для начальной настройки базы данных
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    # Пробрасываем порт 5432 с хост-машины внутрь контейнера
    ports:
      - "5432:5432"
    # Сохраняем данные базы в именованном томе, чтобы они не пропадали при удалении контейнера
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Проверка готовности базы (используется другими сервисами через depends_on)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Основное FastAPI приложение
  app:
    # Собираем образ из текущей директории (используя Dockerfile)
    build: .
    container_name: fastapi_app
    # Пробрасываем стандартный HTTP-порт приложения и порт визуализации БД
    ports:
      - "8000:8000"
      - "8080:8080"
    # Настройки подключения к БД и параметры проекта
    # По умолчанию используем .env.development, но можно переопределить через переменную окружения
    env_file:
      - .env.development
    # Если нужно использовать другой файл, можно добавить его вторым (он перекроет первый)
    # или запускать через: docker compose --env-file .env.production up
    # Ожидаем готовности локальных зависимостей перед запуском приложения
    depends_on:
      db:
        # Ждем, пока healthcheck сервиса 'db' вернет УСПЕХ
        condition: service_healthy
    # Монтируем текущую папку в контейнер для мгновенного применения изменений кода (hot-reload)
    volumes:
      - .:/app
    # Команда для запуска всех необходимых команд инициализации через скрипт
    command: bash /app/docker-entrypoint.sh

volumes:
  postgres_data:
